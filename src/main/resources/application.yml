spring:
  application:
    name: readygsm-server

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/readygsm?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      database: 1

  session:
    redis:
      flush-mode: immediate
      save-mode: on-set-attribute

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

server:
  port: 8080
  servlet:
    context-path: /ready-gsm
    session:
      timeout: 3h

google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI}

oauth2:
  success-redirect-url: ${OAUTH2_SUCCESS_REDIRECT_URL:/}
  failure-redirect-url: ${OAUTH2_FAILURE_REDIRECT_URL:/}
  allowed-redirect-uris:
    - "http://localhost:3000/oauth/callback"
    - "https://stage.readygsm.kr/oauth/callback"
    - "https://www.readygsm.kr/oauth/callback"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html

sdk:
  logging:
    enabled: true
    not-logging-urls:
      - "/v3/api-docs/**"
      - "/swagger-ui/**"
      - "/api/v1/auth/callback"

  response:
    enabled: true
    not-wrapping-urls:
      - "/v3/api-docs/**"

  exception:
    enabled: true
    use-english-message: true

  swagger:
    enabled: true
    title: "ReadyGSM API"
    paths-to-match:
      - "/v1/**"
      - "/ready-gsm/v1/**"