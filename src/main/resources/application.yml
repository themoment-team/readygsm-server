spring:
  application:
    name: readygsm-server

  datasource:
    url: jdbc:mysql://localhost:3306/readygsm?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000        # 1시간
  refresh-token-expiration: 1209600000    # 14일

oauth2:
  success-redirect-url: ${OAUTH2_SUCCESS_REDIRECT_URL:/}
  failure-redirect-url: ${OAUTH2_FAILURE_REDIRECT_URL:/}

sdk:
  logging:
    enabled: true
    not-logging-urls:
      - "/v3/api-docs/**"
      - "/swagger-ui/**"

  response:
    enabled: true
    not-wrapping-urls:
      - "/v3/api-docs/**"

  exception:
    enabled: true
    use-english-message: true

  swagger:
    enabled: true
    title: "ReadyGSM API"
    paths-to-match:
      - "/v1/**"