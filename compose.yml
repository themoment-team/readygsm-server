services:
  mysql:
    image: mysql:8.0
    container_name: readygsm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: readygsm
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.0
    container_name: readygsm-redis
    ports:
      - "6379:6379"

volumes:
  mysql-data: