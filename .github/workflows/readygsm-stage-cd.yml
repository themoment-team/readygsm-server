name: Stage CD

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          envs: GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,KAKAO_CLIENT_ID,KAKAO_CLIENT_SECRET,MYSQL_USERNAME,MYSQL_PASSWORD,REDIS_PASSWORD
          script: |
            export GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
            export GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
            export KAKAO_CLIENT_ID=$KAKAO_CLIENT_ID
            export KAKAO_CLIENT_SECRET=$KAKAO_CLIENT_SECRET
            export MYSQL_USERNAME=$MYSQL_USERNAME
            export MYSQL_PASSWORD=$MYSQL_PASSWORD
            export REDIS_PASSWORD=$REDIS_PASSWORD
            cd $HOME/Downloads/readygsm-server && git pull origin develop
            bash $HOME/Downloads/readygsm-server/scripts/stage/deploy.sh
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
